<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scam Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1>Nexus Shield</h1>
            <p>Advanced AI-Powered Threat Detection</p>
        </header>

        <main>
            <div class="scanner-card">
                <div class="input-group">
                    <label for="messageInput">Analyze Message or Text</label>
                    <textarea 
                        id="messageInput" 
                        placeholder="Paste a suspicious SMS, email, or message here to verify its authenticity..."
                        rows="5"
                    ></textarea>
                </div>
                
                <button id="scanBtn" class="primary-btn">
                    <span class="btn-text">Initiate Scan</span>
                    <i class="fa-solid fa-radar fa-spin icon-scanning hidden"></i>
                    <i class="fa-solid fa-arrow-right icon-default"></i>
                </button>
            </div>

            <div id="resultCard" class="result-card hidden">
                <div class="result-header">
                    <div class="status-icon">
                        <i id="statusIcon" class="fa-solid fa-circle-check"></i>
                    </div>
                    <h2 id="statusTitle">Safe Message</h2>
                </div>
                
                <div class="confidence-meter">
                    <div class="meter-header">
                        <span>AI Confidence Score</span>
                        <span id="confidenceValue" class="value">98.5%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>

                <div class="metrics-grid">
                    <div class="metric">
                        <p class="metric-label">Scam Probability</p>
                        <p id="scamProb" class="metric-value">1.5%</p>
                    </div>
                    <div class="metric">
                        <p class="metric-label">Legit Probability</p>
                        <p id="legitProb" class="metric-value">98.5%</p>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Powered by DistilBERT NLP Engine</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
